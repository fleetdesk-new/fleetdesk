{name: mirror-site, on: workflow_dispatch, permissions: {contents: write}, jobs: {mirror: {runs-on: ubuntu-latest, steps: [{uses: actions/checkout@v4}, {run: 'B=https://mahs-website-gules.vercel.app; find . -maxdepth 1 ! -name .git ! -name .github ! -name . -exec rm -rf {} +; mkdir -p assets/img assets/video; curl -fsSL $B/ -o index.html; curl -fsSL $B/assets/index-DznWyOOY.js -o assets/index-DznWyOOY.js; curl -fsSL $B/assets/index-YSIuQ3ZE.css -o assets/index-YSIuQ3ZE.css; for f in hero-cat16.jpg hero-cat16-mobile.jpg cat10l-dusk.jpg cat10-render.jpg cat16-profile.jpg melissa-bow.jpg melissa-profile.jpg melissa-fly.jpg melissa-galley.jpg inf-hero.jpg inf-coupe-beach.jpg inf-fly-aerial.jpg inf-fly-run.jpg inf-saloon.jpg inf-aft.jpg inf-helm.jpg poster-coupe.jpg poster-gt.jpg; do curl -fsSL $B/assets/img/$f -o assets/img/$f; done; for f in infiniti-coupe.mp4 infiniti-gt.mp4; do curl -fsSL $B/assets/video/$f -o assets/video/$f; done; git config user.name mirror-bot; git config user.email mirror-bot@users.noreply.github.com; git add -A; git commit -m mirror; git push'}]}}}
